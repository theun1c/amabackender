services: 
  app-postgres:
    image: postgres:18.3-bookworm
    container_name: app-env-postgres 
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD} 
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ${PROJECT_ROOT}/out/pgdata:/var/lib/postgresql
    restart: always

  app-postgres-migrate:
    image: migrate/migrate
    container_name: app-env-postgres-migrate
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations 
    
  app-port-forwarder: 
    image: alpine/socat
    container_name: app-env-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:app-postgres:5432
    ports:
      - "127.0.0.1:5432:5432"